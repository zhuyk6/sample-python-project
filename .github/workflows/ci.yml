name: CI

on:
  push:
    paths-ignore:
      - assets/coverage-badge.svg
  pull_request:
    paths-ignore:
      - assets/coverage-badge.svg

jobs:

  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install ruff
        uses: astral-sh/ruff-action@v3

      - name: Lint
        run: |
          ruff check .

      - name: Format (check)
        run: |
          ruff format --check


  pytest:
    runs-on: ubuntu-latest
    needs: ruff
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
    
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      
      - name: Install dependencies
        run: uv sync --all-extras --dev
      
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml:cov.xml
    
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cov.xml
          compression-level: 9
  
  generate-coverage-badge:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
        contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Display structure of downloaded files
        run: ls -R
    
      - name: Generate coverage badge
        run: |
          uv tool install genbadge[coverage]
          uv run genbadge coverage -i cov.xml -o assets/coverage-badge.svg
      
      - name: Commit coverage badge
        run: |
          git pull --rebase origin main
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add assets/coverage-badge.svg
          git commit -m "chore: update coverage badge [skip ci]" || echo "No changes to commit"
      
      - name: Push coverage badge
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
